<svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="820" fill="#ffffff"/>

  <!-- ===================== ARDUINO MEGA (central) ===================== -->
  <rect x="350" y="300" width="300" height="220" rx="10" fill="#fdf6e3" stroke="#b58900" stroke-width="2"/>
  <text x="500" y="335" text-anchor="middle" font-size="20" font-weight="bold" fill="#4b3b00">Arduino Mega 2560</text>

  <!-- pin labels inside arduino box -->
  <text x="365" y="365" font-size="13" fill="#4b3b00">D9  (RST RFID)</text>
  <text x="365" y="385" font-size="13" fill="#4b3b00">D10 (SS / SDA RFID)</text>
  <text x="365" y="405" font-size="13" fill="#4b3b00">D50 (MISO)</text>
  <text x="365" y="425" font-size="13" fill="#4b3b00">D51 (MOSI)</text>
  <text x="365" y="445" font-size="13" fill="#4b3b00">D52 (SCK)</text>
  <text x="365" y="465" font-size="13" fill="#4b3b00">3.3V / GND</text>

  <text x="500" y="365" font-size="13" fill="#4b3b00">D14 (TX3 → DFPlayer RX)</text>
  <text x="500" y="385" font-size="13" fill="#4b3b00">D15 (RX3 ← DFPlayer TX)</text>
  <text x="500" y="405" font-size="13" fill="#4b3b00">5V / GND</text>

  <text x="365" y="495" font-size="13" fill="#4b3b00">A0 (Potenciômetro)</text>

  <text x="500" y="425" font-size="13" fill="#4b3b00">D23 D25 D27</text>
  <text x="500" y="445" font-size="13" fill="#4b3b00">D29 D31 D33</text>
  <text x="500" y="465" font-size="13" fill="#4b3b00">(botões, pull-up interno)</text>

  <!-- ===================== RFID MFRC522 (top-left) ===================== -->
  <rect x="40" y="30" width="270" height="200" rx="10" fill="#eef7ee" stroke="#2e7d32" stroke-width="2"/>
  <text x="175" y="60" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b5e20">Leitor RFID MFRC522</text>
  <text x="55" y="90" font-size="13" fill="#1b5e20">SDA (SS)  →  Arduino D10</text>
  <text x="55" y="112" font-size="13" fill="#1b5e20">RST       →  Arduino D9</text>
  <text x="55" y="134" font-size="13" fill="#1b5e20">SCK       →  Arduino D52</text>
  <text x="55" y="156" font-size="13" fill="#1b5e20">MOSI      →  Arduino D51</text>
  <text x="55" y="178" font-size="13" fill="#1b5e20">MISO      →  Arduino D50</text>
  <text x="55" y="200" font-size="13" fill="#1b5e20">3.3V / GND → 3.3V / GND</text>
  <text x="55" y="222" font-size="12" fill="#b00020">⚠ alimentar em 3.3V, não em 5V</text>

  <!-- connector line RFID -> Arduino -->
  <line x1="310" y1="130" x2="350" y2="380" stroke="#2e7d32" stroke-width="2"/>

  <!-- ===================== DFPlayer Mini (top-right) ===================== -->
  <rect x="690" y="30" width="270" height="220" rx="10" fill="#eef2fb" stroke="#1a4fa0" stroke-width="2"/>
  <text x="825" y="60" text-anchor="middle" font-size="18" font-weight="bold" fill="#0d3273">DFPlayer Mini</text>
  <text x="705" y="90" font-size="13" fill="#0d3273">VCC → Arduino 5V</text>
  <text x="705" y="112" font-size="13" fill="#0d3273">GND → Arduino GND</text>
  <text x="705" y="134" font-size="13" fill="#0d3273">RX  ← Arduino D14 (TX3)</text>
  <text x="705" y="156" font-size="13" fill="#0d3273">      (com resistor 1kΩ em série)</text>
  <text x="705" y="178" font-size="13" fill="#0d3273">TX  → Arduino D15 (RX3)</text>
  <text x="705" y="205" font-size="13" fill="#0d3273">SPK_1 / SPK_2 → Alto-falante</text>

  <!-- speaker icon -->
  <rect x="705" y="215" width="40" height="30" fill="#0d3273"/>
  <polygon points="745,215 780,200 780,260 745,245" fill="#0d3273"/>
  <text x="790" y="235" font-size="13" fill="#0d3273">Alto-falante</text>

  <!-- connector line DFPlayer -> Arduino -->
  <line x1="690" y1="140" x2="650" y2="380" stroke="#1a4fa0" stroke-width="2"/>

  <!-- ===================== BOTÕES (bottom-left) ===================== -->
  <rect x="40" y="580" width="300" height="200" rx="10" fill="#fbeeee" stroke="#b00020" stroke-width="2"/>
  <text x="190" y="610" text-anchor="middle" font-size="18" font-weight="bold" fill="#7a0010">Botões (INPUT_PULLUP)</text>
  <text x="55" y="640" font-size="13" fill="#7a0010">Fazenda     → D23 → GND</text>
  <text x="55" y="662" font-size="13" fill="#7a0010">Zoológico   → D25 → GND</text>
  <text x="55" y="684" font-size="13" fill="#7a0010">Aquário     → D27 → GND</text>
  <text x="55" y="706" font-size="13" fill="#7a0010">Pause/Play  → D29 → GND</text>
  <text x="55" y="728" font-size="13" fill="#7a0010">Repetir som → D31 → GND</text>
  <text x="55" y="750" font-size="13" fill="#7a0010">Liga/Desliga→ D33 → GND</text>

  <!-- connector line buttons -> Arduino -->
  <line x1="340" y1="650" x2="400" y2="520" stroke="#b00020" stroke-width="2"/>

  <!-- ===================== POTENCIÔMETRO (bottom-right) ===================== -->
  <rect x="690" y="580" width="270" height="140" rx="10" fill="#f6efee" stroke="#7a4a1f" stroke-width="2"/>
  <text x="825" y="610" text-anchor="middle" font-size="18" font-weight="bold" fill="#5c3814">Potenciômetro 10kΩ</text>
  <text x="705" y="640" font-size="13" fill="#5c3814">Terminal 1 → Arduino 5V</text>
  <text x="705" y="662" font-size="13" fill="#5c3814">Terminal 2 → Arduino GND</text>
  <text x="705" y="684" font-size="13" fill="#5c3814">Cursor (wiper) → Arduino A0</text>

  <!-- connector line pot -> Arduino -->
  <line x1="690" y1="640" x2="600" y2="520" stroke="#7a4a1f" stroke-width="2"/>

  <!-- legend -->
  <text x="500" y="800" text-anchor="middle" font-size="12" fill="#666666">Diagrama de ligações simplificado — não representa o layout físico exato dos pinos do Arduino Mega.</text>
</svg>
